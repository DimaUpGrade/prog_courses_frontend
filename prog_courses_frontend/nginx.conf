server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Сжатие текстовых ответов
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Кэширование статичных файлов со хэшем в имени (js/css/изображения)
    location ~* \.(?:css|js|woff2?|ttf|otf|svg|png|jpe?g|gif|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Поддержка Vue Router в режиме history:
    # все неизвестные пути отдаём на index.html, дальше роутинг
    # обрабатывает сам фронтенд
    location / {
        try_files $uri $uri/ /index.html;
    }
}
